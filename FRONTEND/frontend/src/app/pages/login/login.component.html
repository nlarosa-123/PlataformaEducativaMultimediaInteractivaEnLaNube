<div class="login-container">
  <div class="login-card">
    <h2 class="font-serif">Login</h2>

    <form (ngSubmit)="login()">
      <div class="input-group">
        <label>Email</label>
        <input type="email" [(ngModel)]="email" name="email" placeholder="tu@email.com">
      </div>

      <div class="input-group">
        <label>Password</label>
        <input type="password" [(ngModel)]="password" name="password" placeholder="********">
      </div>

      <button type="submit" class="btn-login">Entrar</button>
    </form>
    
    <p class="register-link">¿No tienes cuenta? <a routerLink="/register">Regístrate aquí</a></p>
  </div>
</div>
