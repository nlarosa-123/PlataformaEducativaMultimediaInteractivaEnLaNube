<h2>Login</h2>

<form (ngSubmit)="login()">

  <div>
    <label>Email</label>
    <input type="email" [(ngModel)]="email" name="email">
  </div>

  <div>
    <label>Password</label>
    <input type="password" [(ngModel)]="password" name="password">
  </div>

  <button type="submit">Entrar</button>

</form>
