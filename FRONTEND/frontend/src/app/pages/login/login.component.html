<div class="login-container">
  <div class="login-card">
    <h2 class="font-serif">Login</h2>

    <form #loginForm="ngForm" (ngSubmit)="login()">
      <div class="input-group">
        <label>Email</label>
        <input type="email" [(ngModel)]="email" name="email" placeholder="tu@email.com" required email #emailCtrl="ngModel">
        <small *ngIf="emailCtrl.invalid && (emailCtrl.touched || loginForm.submitted)" class="error-message">
          Introduce un email válido.
        </small>
      </div>

      <div class="input-group">
        <label>Password</label>
        <input type="password" [(ngModel)]="password" name="password" placeholder="********" required minlength="6" pattern="^(?=.*[!@#$%^&*]).{6,}$" #passwordCtrl="ngModel">
        <small *ngIf="passwordCtrl.invalid && (passwordCtrl.touched || loginForm.submitted)" class="error-message">
          La contraseña debe tener al menos 6 caracteres y un caracter especial.
        </small>
      </div>

      <button type="submit" class="btn-login" [disabled]="loginForm.invalid">Entrar</button>
    </form>
    
    <p class="register-link">¿No tienes cuenta? <a routerLink="/register">Regístrate aquí</a></p>
  </div>
</div>
