<div class="register-container">
  <div class="register-card">
    <h2 class="font-serif">Registro</h2>

    <form (ngSubmit)="register()">
      <div class="input-group">
        <label>Nombre</label>
        <input type="text" [(ngModel)]="nombre" name="nombre" placeholder="Tu nombre completo">
      </div>

      <div class="input-group">
        <label>Email</label>
        <input type="email" [(ngModel)]="email" name="email" placeholder="tu@email.com">
      </div>

      <div class="input-group">
        <label>Password</label>
        <input type="password" [(ngModel)]="password" name="password" placeholder="********">
      </div>

      <button type="submit" class="btn-register">Registrarse</button>
    </form>
    
    <p class="login-link">¿Ya tienes cuenta? <a routerLink="/login">Inicia sesión</a></p>
  </div>
</div>
