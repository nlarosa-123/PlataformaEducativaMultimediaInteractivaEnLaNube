<div class="register-container">
  <div class="register-card">
    <h2 class="font-serif">Registro</h2>

    <form #registerForm="ngForm" (ngSubmit)="register()">
      <div class="input-group">
        <label>Nombre</label>
        <input type="text" [(ngModel)]="nombre" name="nombre" placeholder="Tu nombre completo" required minlength="3" #nombreCtrl="ngModel">
        <small *ngIf="nombreCtrl.invalid && (nombreCtrl.touched || registerForm.submitted)" class="error-message">
          El nombre debe tener al menos 3 caracteres.
        </small>
      </div>

      <div class="input-group">
        <label>Email</label>
        <input type="email" [(ngModel)]="email" name="email" placeholder="tu@email.com" required email #emailCtrl="ngModel">
        <small *ngIf="emailCtrl.invalid && (emailCtrl.touched || registerForm.submitted)" class="error-message">
          Introduce un email válido.
        </small>
      </div>

      <div class="input-group">
        <label>Password</label>
        <input type="password" [(ngModel)]="password" name="password" placeholder="********" required minlength="6" pattern="^(?=.*[!@#$%^&*]).{6,}$" #passwordCtrl="ngModel">
        <small *ngIf="passwordCtrl.invalid && (passwordCtrl.touched || registerForm.submitted)" class="error-message">
          La contraseña debe tener al menos 6 caracteres y un caracter especial.
        </small>
      </div>

      <button type="submit" class="btn-register" [disabled]="registerForm.invalid">Registrarse</button>
    </form>
    
    <p class="login-link">¿Ya tienes cuenta? <a routerLink="/login">Inicia sesión</a></p>
  </div>
</div>
